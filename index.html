<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>奇門 · 天機問卦</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Serif TC', serif;
      background: #0d0a06;
      color: #f0e0b0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #app { position: relative; }

    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      position: relative;
    }
    .screen.active { display: flex; }

    /* Stars */
    #stars { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
    .star { position:absolute; border-radius:50%; background:#f0e0b0; animation:twinkle var(--dur) ease-in-out infinite; opacity:0; }
    @keyframes twinkle { 0%,100%{opacity:0} 50%{opacity:var(--op)} }

    /* Welcome */
    #welcome { text-align:center; z-index:1; }
    .bagua-ring { width:160px; height:160px; margin:0 auto 2rem; position:relative; animation:spin-slow 20s linear infinite; }
    .bagua-ring svg { width:100%; height:100%; }
    @keyframes spin-slow { to { transform:rotate(360deg); } }

    .site-logo {
      width: 120px;
      margin: 0 auto 1.5rem;
      display: block;
      opacity: 0.9;
    }
    
    .title-main {
      font-size: 3.2rem;
      font-weight: 900;
      letter-spacing: 0.4em;
      color: #f0c040;
      text-shadow: 0 0 40px rgba(240,192,64,0.5);
      margin-bottom: 0.3rem;
    }
    .title-sub {
      font-size: 1.05rem;
      letter-spacing: 0.25em;
      color: #d4aa60;
      margin-bottom: 2.5rem;
    }
    .quote-box { max-width:290px; margin:0 auto 3rem; }
    .quote {
      font-size: 1rem;
      line-height: 2.2;
      color: #e0c880;
      letter-spacing: 0.12em;
      font-style: italic;
    }
    .quote-divider { width:60px; height:1px; background:linear-gradient(to right,transparent,#f0c040,transparent); margin:1.5rem auto; }
    .tap-prompt {
      font-size: 0.95rem;
      letter-spacing: 0.3em;
      color: #b09040;
      animation: pulse-text 2s ease-in-out infinite;
    }
    @keyframes pulse-text { 0%,100%{opacity:0.5} 50%{opacity:1} }

    /* Question */
    #question { z-index:1; text-align:center; }
    .q-title { font-size:1.2rem; letter-spacing:0.3em; color:#d4aa60; margin-bottom:0.5rem; }
    .q-sub { font-size:0.9rem; letter-spacing:0.2em; color:#907840; margin-bottom:2.5rem; }
    .q-divider { width:80px; height:1px; background:linear-gradient(to right,transparent,#f0c040,transparent); margin:0 auto 2.5rem; }
    .options-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; width:100%; max-width:320px; }
    .option-card {
      background: rgba(240,192,64,0.08);
      border: 1px solid rgba(240,192,64,0.35);
      border-radius: 12px;
      padding: 1.5rem 1rem;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
    }
    .option-card:active { transform:scale(0.95); background:rgba(240,192,64,0.18); border-color:#f0c040; }
    .option-icon { font-size:1.8rem; margin-bottom:0.5rem; display:block; }
    .option-text { font-size:0.95rem; letter-spacing:0.15em; color:#e0c880; }

    /* Drawing */
    #drawing { z-index:1; text-align:center; }
    .draw-title { font-size:1rem; letter-spacing:0.3em; color:#b09040; margin-bottom:3rem; }
    .yarrow-container { position:relative; width:120px; height:120px; margin:0 auto 3rem; }
    .yarrow-circle { position:absolute; top:0; left:0; width:100%; height:100%; border:1px solid rgba(240,192,64,0.4); border-radius:50%; animation:expand-ring 1.5s ease-out infinite; }
    .yarrow-circle:nth-child(2) { animation-delay:0.5s; }
    .yarrow-circle:nth-child(3) { animation-delay:1s; }
    @keyframes expand-ring { 0%{transform:scale(0.3);opacity:1} 100%{transform:scale(1.8);opacity:0} }
    .yarrow-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:60px; height:60px; border:1px solid #f0c040; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.8rem; color:#f0c040; }
    .draw-lines { font-size:0.95rem; letter-spacing:0.2em; color:#907840; line-height:2.8; }
    .draw-line-reveal { opacity:0; animation:reveal-line 0.6s ease forwards; }
    @keyframes reveal-line { to{opacity:1} }

    /* Result */
    #result { z-index:1; text-align:center; padding-bottom:4rem; }
    .result-symbol-wrap { margin:2rem auto; position:relative; width:180px; height:180px; animation:float-symbol 3s ease-in-out infinite; }
    @keyframes float-symbol { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .result-glow { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:200px; height:200px; border-radius:50%; background:radial-gradient(circle,rgba(240,192,64,0.2) 0%,transparent 70%); animation:glow-pulse 2s ease-in-out infinite; }
    @keyframes glow-pulse { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.2)} }
    .result-symbol-svg { width:100%; height:100%; position:relative; z-index:1; }
    .result-name { font-size:1.6rem; font-weight:900; letter-spacing:0.3em; color:#f0c040; margin-bottom:0.4rem; }
    .result-subtitle { font-size:0.9rem; letter-spacing:0.25em; color:#b09040; margin-bottom:2.5rem; }
    .scroll-hint { font-size:0.85rem; letter-spacing:0.2em; color:#705820; animation:bounce-down 1.5s ease-in-out infinite; margin-bottom:2rem; }
    @keyframes bounce-down { 0%,100%{transform:translateY(0)} 50%{transform:translateY(5px)} }

    .interpretation { max-width:320px; margin:0 auto; text-align:left; }
    .interp-section { margin-bottom:1.8rem; opacity:0; transform:translateY(20px); transition:all 0.6s ease; }
    .interp-section.visible { opacity:1; transform:translateY(0); }
    .interp-label { font-size:0.8rem; letter-spacing:0.3em; color:#b09040; margin-bottom:0.6rem; border-left:2px solid #f0c040; padding-left:0.7rem; }
    .interp-text { font-size:0.95rem; line-height:2.1; color:#e0c880; letter-spacing:0.05em; }
    .interp-divider { width:100%; height:1px; background:linear-gradient(to right,transparent,rgba(240,192,64,0.3),transparent); margin:1.2rem 0; }

    .restart-area { margin-top:3rem; padding:1rem; cursor:pointer; }
    .restart-text { font-size:0.85rem; letter-spacing:0.3em; color:#907840; cursor:pointer; }
    .restart-text:active { color:#f0c040; }

    .cta-section .cta-text {
      font-size: 0.88rem;
      line-height: 2.1;
      color: #c4a96e;
      letter-spacing: 0.08em;
      font-style: italic;
      text-align: center;
    }
    .cta-links {
      margin-top: 3rem;
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
    }
    .link-divider { color: #4a3c1c; font-size: 0.8rem; }

    /* Loading / Error */
    .loading-text { font-size:0.95rem; letter-spacing:0.3em; color:#b09040; animation:pulse-text 1.5s ease-in-out infinite; }
    .error-text { font-size:0.9rem; letter-spacing:0.1em; color:#d47a7a; line-height:2.2; max-width:280px; text-align:center; }

    #overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:#0d0a06; z-index:100; pointer-events:none; opacity:0; transition:opacity 0.5s; }
    #overlay.show { opacity:1; pointer-events:all; }

    /* Share button */
    .share-btn-wrap { margin-top: 2.2rem; margin-bottom: 0.2rem; }
    .share-btn {
      background: rgba(240,192,64,0.1);
      border: 1px solid rgba(240,192,64,0.55);
      border-radius: 10px;
      padding: 0.75rem 2.5rem;
      color: #f0e0b0;
      font-family: 'Noto Serif TC', serif;
      font-size: 0.95rem;
      letter-spacing: 0.3em;
      cursor: pointer;
      transition: background 0.25s;
    }
    .share-btn:active, .share-btn:focus { background: rgba(240,192,64,0.2); outline: none; }
    .share-btn:disabled { opacity: 0.5; cursor: default; }

  </style>
</head>

  <div id="overlay"></div>

  </div>

<script>
// ★ 把 Google Sheet CSV 網址貼在這裡 ★
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1-0AHo1E15OQiAPn46Ielz6ZDc2FBYlyLjjqr9m4iVR8/export?format=csv&gid=0';

const categoryNames = { work:'工作問事', wealth:'財運問事', love:'桃花問事', misc:'綜合問事' };
const adviceKey = { work:'advice_work', wealth:'advice_wealth', love:'advice_love', misc:'advice_misc' };

let SYMBOLS_DATA = [];
let currentCategory = null;
let currentResultData = null;
const mainLogoUrl = new URL('./logo-main.png', window.location.href).href;
const watermarkLogoUrl = 'https://qimen-lottery.vercel.app/logo-watermark.png';
const logoImageCache = new Map();

function loadLogoImage(url) {
  // watermark 不走 cache，避免 CORS 問題
  if (url === watermarkLogoUrl) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.decoding = 'async';
      img.onload = async () => {
        try { if (img.decode) await img.decode(); } catch(e) {}
        resolve(img);
      };
      img.onerror = () => reject(new Error(`Logo failed to load: ${url}`));
      img.src = url;
    });
  }
  
  if (logoImageCache.has(url)) return logoImageCache.get(url);

  const promise = new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.decoding = 'async';
    img.onload = async () => {
      try {
        if (img.decode) await img.decode();
      } catch(e) {}
      resolve(img);
    };
    img.onerror = () => reject(new Error(`Logo failed to load: ${url}`));
    img.src = url;
  });

  logoImageCache.set(url, promise);
  return promise;
}

function initMainLogo() {
  loadLogoImage(mainLogoUrl).catch(() => {});
  loadLogoImage(watermarkLogoUrl).catch(() => {});
}

// Stars
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2 + 0.5;
  s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--op:${0.3+Math.random()*0.6}`;
  starsEl.appendChild(s);
}

// CSV parser（支援欄位內含逗號的引號包覆格式）
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).map(line => {
    const fields = [];
    let cur = '', inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQuote = !inQuote; }
      else if (c === ',' && !inQuote) { fields.push(cur); cur = ''; }
      else { cur += c; }
    }
    fields.push(cur);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (fields[i] || '').trim().replace(/^"|"$/g, ''); });
    return obj;
  }).filter(row => row.symbol && row.symbol.length > 0);
}

async function loadData() {
  try {
    const res = await fetch(SHEET_CSV_URL);
    if (!res.ok) throw new Error('fetch failed');
    const text = await res.text();
    SYMBOLS_DATA = parseCSV(text);
    if (SYMBOLS_DATA.length === 0) throw new Error('empty');
    showScreen('welcome');
  } catch(e) {
    document.getElementById('loading-screen').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
        <div class="error-text">
          符號資料載入失敗<br><br>
          請確認 Google Sheet<br>已發佈為公開 CSV<br><br>
          <span style="font-size:0.8rem;color:#705820">或 SHEET_CSV_URL 尚未設定</span>
        </div>
      </div>`;
  }
}

function transition(fn) {
  const ov = document.getElementById('overlay');
  ov.classList.add('show');
  setTimeout(() => { fn(); ov.classList.remove('show'); }, 500);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goToQuestion() { transition(() => showScreen('question')); }

function startDrawing(category) {
  currentCategory = category;
  transition(() => { showScreen('drawing'); runDrawingAnimation(); });
}

function runDrawingAnimation() {
  const linesEl = document.getElementById('draw-lines');
  const titleEl = document.getElementById('draw-title');
  linesEl.innerHTML = '';
  const steps = ['排布天盤...', '定位地盤...', '推算時干...', '歸藏卦象...'];
  let idx = 0;
  function addStep() {
    if (idx < steps.length) {
      titleEl.textContent = steps[idx];
      const line = document.createElement('div');
      line.className = 'draw-line-reveal';
      line.style.animationDelay = '0.1s';
      line.textContent = steps[idx];
      linesEl.appendChild(line);
      idx++;
      setTimeout(addStep, 900);
    } else { setTimeout(showResult, 600); }
  }
  setTimeout(addStep, 400);
}

function showResult() {
  const data = SYMBOLS_DATA[Math.floor(Math.random() * SYMBOLS_DATA.length)];
  const color = data.color || '#f0c040';

  transition(() => {
    showScreen('result');
    document.getElementById('result-category').textContent = categoryNames[currentCategory] || '';
    document.getElementById('result-name').textContent = data.symbol;
    document.getElementById('result-subtitle').textContent = data.subtitle || '';

    const svg = document.getElementById('result-svg');
    svg.innerHTML = `
      <circle cx="90" cy="90" r="75" fill="none" stroke="${color}44" stroke-width="1"/>
      <circle cx="90" cy="90" r="55" fill="none" stroke="${color}66" stroke-width="0.5"/>
      <text x="90" y="105" text-anchor="middle" font-family="serif" font-size="72" fill="${color}">${data.symbol[0]}</text>`;

    const advice = data[adviceKey[currentCategory]] || data['advice_misc'] || '';
    currentResultData = { symbol: data.symbol, subtitle: data.subtitle || '', overview: data.overview || '', advice, color, category: categoryNames[currentCategory] || '' };
    const interpEl = document.getElementById('interpretation');
    interpEl.innerHTML = '';

    const sections = [
      { label: '卦象總覽', text: data.overview },
      { label: '本次建議', text: advice }
    ];

    sections.forEach(({ label, text }, i) => {
      if (!text) return;
      if (i > 0) {
        const div = document.createElement('div');
        div.className = 'interp-divider';
        interpEl.appendChild(div);
      }
      const sec = document.createElement('div');
      sec.className = 'interp-section';
      sec.innerHTML = `<div class="interp-label">${label}</div><div class="interp-text">${text}</div>`;
      interpEl.appendChild(sec);
      setTimeout(() => sec.classList.add('visible'), 300 + i * 200);
    });

    // 結語引導
    const ctaDivider = document.createElement('div');
    ctaDivider.className = 'interp-divider';
    interpEl.appendChild(ctaDivider);

    const cta = document.createElement('div');
    cta.className = 'interp-section cta-section';
    cta.innerHTML = `<div class="cta-text">此卦僅是天機一隅，<br>若欲深入解局，<br>可加入老師為您指引</div>`;
    interpEl.appendChild(cta);
    setTimeout(() => cta.classList.add('visible'), 300 + sections.length * 200);

    document.getElementById('result').scrollTop = 0;
    window.scrollTo(0, 0);
  });
}

function restart() {
  transition(() => {
    showScreen('question');
    document.getElementById('result').scrollTop = 0;
  });
}

function contactLine() {
  // ★ 待 Peter 提供 LINE@ 網址後填入 ★
  const LINE_URL = 'https://line.me/R/ti/p/@384amzuj';
  window.open(LINE_URL, '_blank');
}

async function addLogoToCanvas(canvas) {
  try {
    const img = await loadLogoImage(watermarkLogoUrl);
    const ctx = canvas.getContext('2d');
    const maxLogoW = canvas.width * 0.18;
    const logoW = Math.min(maxLogoW, 132);
    const logoH = logoW * (img.naturalHeight / img.naturalWidth);
    const margin = canvas.width * 0.045;
    ctx.drawImage(img, canvas.width - logoW - margin, margin, logoW, logoH);
    window.open(canvas.toDataURL('image/png'));
  } catch(e) {
    console.log('watermark error:', e.message, watermarkLogoUrl);
    try {
      const ctx = canvas.getContext('2d');
      const fontSize = Math.max(18, Math.round(canvas.width * 0.032));
      ctx.save();
      ctx.font = `${fontSize}px serif`;
      ctx.fillStyle = 'rgba(176, 144, 64, 0.75)';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'bottom';
      ctx.fillText('奇門 · 天機問卦', canvas.width - 20, canvas.height - 20);
      ctx.restore();
    } catch(e2) {}
  }
}

async function shareResult() {
  if (!currentResultData) return;
  const btn = document.getElementById('share-btn');
  btn.disabled = true;
  const { symbol, subtitle, overview, advice, color, category } = currentResultData;

  const sectionHtml = (label, text) => text ? `
    <div style="font-size:0.75rem;letter-spacing:0.3em;color:#b09040;margin-bottom:0.5rem;border-left:2px solid #f0c040;padding-left:0.7rem">${label}</div>
    <div style="font-size:0.88rem;line-height:2.1;color:#e0c880;letter-spacing:0.05em">${text}</div>
  ` : '';
  const dividerHtml = '<div style="width:100%;height:0;border-top:1px solid rgba(240,192,64,0.3);margin:1.2rem 0"></div>';
  
  const captureEl = document.createElement('div');
  captureEl.style.cssText = 'position:fixed;left:-9999px;top:0;width:360px;background:#0d0a06;color:#f0e0b0;font-family:serif;padding:2.5rem 1.8rem 2rem;';
  captureEl.innerHTML = `
    <div style="text-align:center;">
      <div style="font-size:0.75rem;letter-spacing:0.3em;color:#b09040;margin-bottom:1.2rem">${category}</div>
      <div style="width:140px;height:140px;margin:0 auto 1.2rem;">
        <div style="width:140px;height:140px;margin:0 auto 1.2rem;position:relative;display:flex;align-items:center;justify-content:center;">
          <div style="position:absolute;width:140px;height:140px;border-radius:50%;border:1px solid ${color}44;"></div>
          <div style="position:absolute;width:110px;height:110px;border-radius:50%;border:1px solid ${color}66;"></div>
          <div style="font-size:72px;color:${color};font-family:serif;">${symbol[0]}</div>
        </div>
      </div>
      <div style="font-size:1.4rem;font-weight:900;letter-spacing:0.3em;color:#f0c040;margin-bottom:0.3rem">${symbol}</div>
      <div style="font-size:0.8rem;letter-spacing:0.2em;color:#b09040;margin-bottom:1.8rem">${subtitle}</div>
    </div>
    <div style="text-align:left;">
      ${sectionHtml('卦象總覽', overview)}
      ${overview && advice ? dividerHtml : ''}
      ${sectionHtml('本次建議', advice)}
    </div>
  `;
  document.body.appendChild(captureEl);

  try {
    const canvas = await html2canvas(captureEl, {
      backgroundColor: '#0d0a06',
      scale: 2,
      logging: false,
      useCORS: true,
      width: 360,
      height: captureEl.scrollHeight
    });

    await addLogoToCanvas(canvas);

    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    const fileName = `奇門天機問卦_${symbol}.png`;
    const file = new File([blob], fileName, { type: 'image/png' });

    let canShareFiles = false;
    try { if (navigator.canShare) canShareFiles = navigator.canShare({ files: [file] }); } catch(e) {}

    if (canShareFiles) {
      await navigator.share({ files: [file], title: '奇門天機問卦', text: `我抽到了「${symbol}」卦，奇門天機問卦` });
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }
  } catch(e) {
    if (e.name !== 'AbortError') console.warn('share failed:', e);
  } finally {
    document.body.removeChild(captureEl);
    btn.disabled = false;
  }
}

initMainLogo();
loadData();
</script>
